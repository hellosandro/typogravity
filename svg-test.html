<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SVG glyph + SVG collision — Matter proof</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
  #world { position: fixed; inset: 0; cursor: grab; }
  #world:active { cursor: grabbing; }
  canvas { display: block; }
  .hud { position: fixed; top: 14px; left: 14px; z-index: 5; color: #fff; font-size: 12px; opacity: 0.7; pointer-events: none; line-height: 1.5; }
  .hud b { font-weight: 700; }
  .err { position: fixed; top: 50%; left: 0; right: 0; text-align: center; color: #ff6b6b; font-size: 14px; }
</style>
</head>
<body>
<div class="hud">
  <b>SVG glyph + SVG collision</b><br>
  red = glyph (Path2D) · white = collision (compound body)<br>
  drag it · long-press / double-tap to drop more
</div>
<div id="world"></div>

<script>
  const { Engine, Render, Runner, Bodies, Body, Composite, Mouse, MouseConstraint, Events } = Matter;

  // ---- util ----
  function signedArea(p) {
    let a = 0;
    for (let i = 0; i < p.length; i++) { const q = p[(i + 1) % p.length]; a += p[i].x * q.y - q.x * p[i].y; }
    return a / 2;
  }
  // baricentro (area-pesato) di un poligono — serve a riportare il pezzo alla sua posizione SVG
  function centroidOf(p) {
    let A = 0, cx = 0, cy = 0;
    for (let i = 0; i < p.length; i++) {
      const a = p[i], b = p[(i + 1) % p.length], cr = a.x * b.y - b.x * a.y;
      A += cr; cx += (a.x + b.x) * cr; cy += (a.y + b.y) * cr;
    }
    A *= 0.5;
    if (Math.abs(A) < 1e-9) return { x: p[0].x, y: p[0].y };
    return { x: cx / (6 * A), y: cy / (6 * A) };
  }
  function parsePolygon(pg) {
    const n = pg.getAttribute("points").trim().split(/[\s,]+/).map(parseFloat);
    let pts = [];
    for (let i = 0; i + 1 < n.length; i += 2) pts.push({ x: n[i], y: n[i + 1] });
    // togli vertici duplicati consecutivi e il punto di chiusura ripetuto
    const out = [];
    for (const p of pts) { const l = out[out.length - 1]; if (!l || Math.hypot(p.x - l.x, p.y - l.y) > 0.01) out.push(p); }
    if (out.length > 2) { const f = out[0], l = out[out.length - 1]; if (Math.hypot(f.x - l.x, f.y - l.y) < 0.01) out.pop(); }
    // winding coerente con Matter (come Bodies.rectangle: area con segno positiva)
    if (signedArea(out) < 0) out.reverse();
    return out;
  }

  async function main() {
    // 1) carico i due SVG (stesso viewBox → stesso sistema di coordinate)
    const [glyphTxt, collTxt] = await Promise.all([
      fetch("A-gliph.svg").then(r => r.text()),
      fetch("A-collision.svg").then(r => r.text()),
    ]);
    const parser = new DOMParser();
    const gDoc = parser.parseFromString(glyphTxt, "image/svg+xml");
    const cDoc = parser.parseFromString(collTxt, "image/svg+xml");

    // 2) glifo → Path2D (riempito nonzero: il controforma resta vuoto)
    const glyphPath = new Path2D(gDoc.querySelector("path").getAttribute("d"));

    // 3) collisione: ogni <polygon> → vertici puliti, winding coerente
    const polys = Array.from(cDoc.querySelectorAll("polygon")).map(parsePolygon);

    const S = 1.5; // scala di disegno (viewBox alto 224 → ~336px)

    // ---- engine / render ----
    const world = document.getElementById("world");
    const engine = Engine.create();
    engine.positionIterations = 10; engine.velocityIterations = 8;
    const render = Render.create({
      element: world, engine,
      options: { width: innerWidth, height: innerHeight, wireframes: false, background: "#0a0a0a", pixelRatio: window.devicePixelRatio || 1 }
    });

    const t = 200, w = innerWidth, h = innerHeight;
    Composite.add(engine.world, [
      Bodies.rectangle(w/2, h + t/2, w*3, t, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(-t/2, h/2, t, h*3, { isStatic: true, render: { visible: false } }),
      Bodies.rectangle(w + t/2, h/2, t, h*3, { isStatic: true, render: { visible: false } }),
    ]);

    const letters = [];
    function spawnA(x, y) {
      // un corpo (parte) per ogni poligono convesso, RIPORTATO alla sua posizione SVG.
      // (Body.create({vertices}) ricentra i vertici sul baricentro a 0,0: con setPosition
      //  lo rimetto alle coordinate reali del pezzo, così l'assemblaggio rispetta l'SVG.)
      const parts = polys.map(p => {
        const sv = p.map(v => ({ x: v.x * S, y: v.y * S }));
        const c = centroidOf(sv);
        const part = Body.create({ vertices: sv, render: { visible: false } });
        Body.setPosition(part, c);
        return part;
      });
      // assemblo il corpo composto; Body.create mette position = baricentro reale (Matter)
      const body = Body.create({ parts, friction: 0.4, frictionAir: 0.008, restitution: 0.3, render: { visible: false } });
      // il glifo va disegnato rispetto allo STESSO baricentro che usa Matter:
      // l'origine viewBox (0,0), in coord-locali del corpo, sta a -position (prima di spostarlo)
      body.glyphOriginLocal = { x: -body.position.x, y: -body.position.y };
      Body.setPosition(body, { x, y });
      Body.setAngle(body, (Math.random() - 0.5) * 0.5);
      Composite.add(engine.world, body);
      letters.push(body);
    }

    Events.on(render, "afterRender", () => {
      const ctx = render.context;
      letters.forEach(b => {
        // glifo: allineato al baricentro reale del corpo, poi scala viewBox→mondo
        ctx.save();
        ctx.translate(b.position.x, b.position.y);
        ctx.rotate(b.angle);
        ctx.translate(b.glyphOriginLocal.x, b.glyphOriginLocal.y);
        ctx.scale(S, S);
        ctx.fillStyle = "#e30613";
        ctx.fill(glyphPath);
        ctx.restore();
        // contorno dei pezzi convessi reali
        ctx.save();
        ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.85)";
        const segs = (b.parts && b.parts.length > 1) ? b.parts.slice(1) : [b];
        segs.forEach(part => {
          const v = part.vertices;
          ctx.beginPath(); ctx.moveTo(v[0].x, v[0].y);
          for (let i = 1; i < v.length; i++) ctx.lineTo(v[i].x, v[i].y);
          ctx.closePath(); ctx.stroke();
        });
        ctx.restore();
      });
    });

    const mouse = Mouse.create(render.canvas);
    const mc = MouseConstraint.create(engine, { mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
    Composite.add(engine.world, mc);
    render.mouse = mouse;

    world.addEventListener("dblclick", e => spawnA(e.clientX, e.clientY));
    window.addEventListener("resize", () => {
      render.canvas.width = innerWidth; render.canvas.height = innerHeight;
      render.options.width = innerWidth; render.options.height = innerHeight;
    });

    Runner.run(engine);
    Render.run(render);

    spawnA(innerWidth/2, 220);
    setTimeout(() => spawnA(innerWidth/2 - 70, 70), 700);
    setTimeout(() => spawnA(innerWidth/2 + 70, 40), 1400);
  }

  (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve())
    .then(main)
    .catch(err => {
      document.body.insertAdjacentHTML("beforeend", '<div class="err">Error: ' + err.message + '</div>');
      console.error(err);
    });
</script>
</body>
</html>
