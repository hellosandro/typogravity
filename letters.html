<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipogravity — letters & collision polygons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Geist', sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    color: #ffffff;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.5;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 4px;
    justify-items: center;
  }
  .cell { display: flex; flex-direction: column; align-items: center; }
  canvas { display: block; }
  .label {
    color: #ffffff;
    opacity: 0.4;
    font-size: 11px;
    letter-spacing: 0.1em;
    margin-top: -10px;
  }
</style>
</head>
<body>
<h1>Letters &amp; collision polygons · font size 180</h1>
<div class="grid" id="grid"></div>

<script>
  const { Bodies, Body } = Matter;

  // ── logica forma (mirror di index.html) ──────────────────────────────
  const HITBOX_W = 0.82;
  const HITBOX_H = 0.72;
  const GLYPH_OFFSET_Y = 0.06;
  const POLY_OFFSET_Y = 10;
  const CHAMFER_ROUND = 0.9;
  const ROUND_OVERRIDE = { O: 0.98, D: 0.98, C: 0.98, S: 0.98 };
  const WIDTH_BONUS = { O: 4 };
  const BAR_COMPENSATION = 0.94;
  const CORNER_MAP = {
    O: [1,1,1,1], S: [1,1,1,1], C: [1,1,1,1],
    G: [1,1,0,1], Q: [1,1,0,1],
    U: [0,0,1,1],
    D: [0,1,1,0], B: [0,1,1,0],
    P: [0,1,0,0], R: [0,1,0,0],
    J: [0,0,1,0],
  };
  function letterChamfer(char, w, h) {
    const c = CORNER_MAP[char];
    if (!c) return undefined;
    const r = Math.min(w, h) / 2 * (ROUND_OVERRIDE[char] || CHAMFER_ROUND);
    return { radius: [c[0]*r, c[1]*r, c[2]*r, c[3]*r] };
  }
  // Campiona i pixel reali del glifo "A" per ricavare l'angolo esatto delle gambe
  // diagonali (e la traversa). Ritorna i parti in coordinate-design (origine = centro box).
  function sampleA(fontSize, opts) {
    const size = Math.ceil(fontSize * 1.8);
    const Cx = Math.round(size / 2), Cy = Math.round(size / 2);
    const glyphRelY = fontSize * GLYPH_OFFSET_Y - POLY_OFFSET_Y;
    const off = document.createElement("canvas");
    off.width = size; off.height = size;
    const o = off.getContext("2d");
    o.fillStyle = "#fff";
    o.textAlign = "center";
    o.textBaseline = "middle";
    o.font = `700 ${fontSize}px "Geist", sans-serif`;
    o.fillText("A", Cx, Cy + glyphRelY);     // glifo disegnato come nell'app (origine box = centro)
    const data = o.getImageData(0, 0, size, size).data;
    const A = (x, y) => (x < 0 || y < 0 || x >= size || y >= size) ? 0 : data[(y * size + x) * 4 + 3];

    let top = -1, bot = -1;
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) { if (A(x, y) > 40) { if (top < 0) top = y; bot = y; break; } }
    }
    if (top < 0) return null;
    const Hk = bot - top;
    const leftmost = y => { for (let x = 0; x < size; x++) if (A(x, y) > 40) return x; return -1; };
    const rightmost = y => { for (let x = size - 1; x >= 0; x--) if (A(x, y) > 40) return x; return -1; };

    // due righe di campionamento sui tratti diagonali → bordo esterno di ogni gamba
    const yA = Math.round(top + 0.35 * Hk), yB = Math.round(top + 0.95 * Hk);
    const Lx1 = leftmost(yA), Lx2 = leftmost(yB);
    const Rx1 = rightmost(yA), Rx2 = rightmost(yB);
    if (Lx1 < 0 || Rx1 < 0) return null;

    // spessore: corsa orizzontale dell'inchiostro al piede sinistro
    let run = 0; { let x = Lx2; while (A(x, yB) > 40) { run++; x++; } }

    const lineX = (x1, y1, x2, y2, y) => x1 + (y - y1) * (x2 - x1) / (y2 - y1);
    const outer = (x1, x2) => ({ a: { x: lineX(x1, yA, x2, yB, top), y: top }, b: { x: lineX(x1, yA, x2, yB, bot), y: bot } });
    const Lo = outer(Lx1, Lx2), Ro = outer(Rx1, Rx2);
    const angL = Math.atan2(Lo.b.y - Lo.a.y, Lo.b.x - Lo.a.x);
    const T = Math.max(run * Math.abs(Math.sin(angL)), fontSize * 0.05);

    // sposta il bordo esterno verso l'interno di T/2 → centro del tratto
    const inward = (e, sign) => {
      const dx = e.b.x - e.a.x, dy = e.b.y - e.a.y, L = Math.hypot(dx, dy);
      const nx = sign * (dy / L), ny = sign * (-dx / L);
      return { a: { x: e.a.x + nx * T / 2, y: e.a.y + ny * T / 2 }, b: { x: e.b.x + nx * T / 2, y: e.b.y + ny * T / 2 } };
    };
    const Lc = inward(Lo, +1);   // gamba sx: interno verso destra (+x)
    const Rc = inward(Ro, -1);   // gamba dx: interno verso sinistra (−x)

    const legPart = c => {
      const cx = (c.a.x + c.b.x) / 2 - Cx;
      const cy = (c.a.y + c.b.y) / 2 - Cy;
      const len = Math.hypot(c.b.x - c.a.x, c.b.y - c.a.y);
      const angle = Math.atan2(c.b.y - c.a.y, c.b.x - c.a.x);
      return Bodies.rectangle(cx, cy, len, T, Object.assign({}, opts, { angle }));
    };
    const parts = [ legPart(Lc), legPart(Rc) ];

    // traversa: cerco il tratto centrale lungo la colonna centrale
    let runs = [], inRun = false, rs = 0;
    for (let y = top; y <= bot; y++) {
      const on = A(Cx, y) > 40;
      if (on && !inRun) { inRun = true; rs = y; }
      else if (!on && inRun) { inRun = false; runs.push([rs, y - 1]); }
    }
    if (inRun) runs.push([rs, bot]);
    let bar = null;
    for (const r of runs) { const mid = (r[0] + r[1]) / 2; if (mid > top + 0.35 * Hk && mid < top + 0.9 * Hk) bar = r; }
    if (bar) {
      const yBar = (bar[0] + bar[1]) / 2;
      const xL = lineX(Lc.a.x, Lc.a.y, Lc.b.x, Lc.b.y, yBar);
      const xR = lineX(Rc.a.x, Rc.a.y, Rc.b.x, Rc.b.y, yBar);
      parts.push(Bodies.rectangle((xL + xR) / 2 - Cx, yBar - Cy, (xR - xL), (bar[1] - bar[0]), opts));
    }
    return parts;
  }

  function letterParts(char, w, h, fontSize, opts) {
    const ST = fontSize * 0.16;
    const BT = ST * BAR_COMPENSATION;
    const mk = (cx, cy, pw, ph, angle) => Bodies.rectangle(cx, cy, pw, ph, angle ? Object.assign({}, opts, { angle }) : opts);
    if (char === "A") {
      const sampled = sampleA(fontSize, opts);
      if (sampled) return sampled;
      // fallback geometrico (angolo box, se il campionamento fallisce)
      const legLen = Math.hypot(w/2, h);
      const legAng = Math.atan2(h, w/2);
      const yc = h * 0.16;
      const t = (yc + h/2) / h;
      return [ mk(-w/4, 0, legLen, ST, -legAng), mk(w/4, 0, legLen, ST, legAng), mk(0, yc, t * w, BT) ];
    }
    if (char === "P") {
      // occhiello (box con angoli destri tondi) + asta verticale sinistra
      const bowlH = h * 0.62;
      const r = bowlH / 2 * 0.9;          // raggio proporzionale all'altezza dell'occhiello
      return [
        Bodies.rectangle(-w/2 + ST/2, 0, ST, h, opts),
        Bodies.rectangle(0, -h/2 + bowlH/2, w, bowlH, Object.assign({}, opts, { chamfer: { radius: [0, r, r, 0] } })),
      ];
    }
    if (char === "J") {
      // fondo (box con angoli bassi tondi) + asta verticale destra
      const botH = h * 0.34;
      const r = Math.min(botH, w/2) * 0.9;   // raggio maggiore
      return [
        Bodies.rectangle(w/2 - ST/2, -botH/4, ST, h - botH/2, opts),
        Bodies.rectangle(0, h/2 - botH/2, w, botH, Object.assign({}, opts, { chamfer: { radius: [0, 0, r, r] } })),
      ];
    }
    if (char === "T") { const barW = w*1.15, barH = BT*0.8; return [ mk(0, -h/2 + barH/2, barW, barH), mk(0, 0, ST, h) ]; }
    if (char === "H") return [ mk(-w/2 + ST/2, 0, ST, h), mk(w/2 - ST/2, 0, ST, h), mk(0, 0, w, BT) ];
    if (char === "F") return [ mk(-w/2 + ST/2, 0, ST, h), mk(0, -h/2 + BT/2, w, BT), mk(0, 0, w, BT) ];
    if (char === "E") return [ mk(-w/2 + ST/2, 0, ST, h), mk(0, -h/2 + BT/2, w, BT), mk(0, 0, w, BT), mk(0, h/2 - BT/2, w, BT) ];
    if (char === "L") return [ mk(-w/2 + ST/2, 0, ST, h), mk(0, h/2 - BT/2, w, BT) ];
    if (char === "I") return [ mk(0, 0, ST, h) ];
    return null;
  }
  const COLORS = ["#E8A4B8","#3E8D5E","#1E3F8A","#D85E3C","#C93B2B","#E8B93C","#A36B4A","#2B6B9E"];

  // ── costruzione corpo (mirror di placeStaticLetter) ──────────────────
  function buildBody(ch, fontSize, letterW, cx, cy) {
    const collisionW = letterW * HITBOX_W + (WIDTH_BONUS[ch] || 0);
    const collisionH = fontSize * HITBOX_H;
    const partOpts = { render: { visible: false } };
    const parts = letterParts(ch, collisionW, collisionH, fontSize, partOpts);
    let body, bcx = 0, bcy = 0;
    if (parts) {
      body = Body.create({ parts: parts });
      bcx = -body.position.x;
      bcy = -body.position.y;
      Body.translate(body, { x: cx, y: cy });
    } else {
      body = Bodies.rectangle(cx, cy, collisionW, collisionH, {
        chamfer: letterChamfer(ch, collisionW, collisionH)
      });
    }
    body.letterChar = ch;
    body.fontSize = fontSize;
    body.bcx = bcx;
    body.bcy = bcy;
    return body;
  }

  function draw(ctx, body, color) {
    // glifo
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.translate(body.position.x, body.position.y);
    ctx.fillStyle = color;
    ctx.font = `700 ${body.fontSize}px "Geist", sans-serif`;
    ctx.fillText(body.letterChar, body.bcx || 0, (body.bcy || 0) + body.fontSize * GLYPH_OFFSET_Y - POLY_OFFSET_Y);
    ctx.restore();
    // poligono di collisione (ogni parte per i corpi composti)
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    const segs = (body.parts && body.parts.length > 1) ? body.parts.slice(1) : [body];
    segs.forEach(part => {
      const v = part.vertices;
      if (!v || v.length === 0) return;
      ctx.beginPath();
      ctx.moveTo(v[0].x, v[0].y);
      for (let i = 1; i < v.length; i++) ctx.lineTo(v[i].x, v[i].y);
      ctx.closePath();
      ctx.stroke();
    });
    ctx.restore();
  }

  const FONT_SIZE = 180;                 // stessa dimensione base dell'app
  const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const CELL = 240;                      // lato cella in px

  document.fonts.ready.then(() => {
    const grid = document.getElementById("grid");
    const dpr = window.devicePixelRatio || 1;
    LETTERS.forEach((ch, i) => {
      const cell = document.createElement("div");
      cell.className = "cell";

      const cv = document.createElement("canvas");
      cv.width = CELL * dpr;
      cv.height = CELL * dpr;
      cv.style.width = CELL + "px";
      cv.style.height = CELL + "px";
      const ctx = cv.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.font = `700 ${FONT_SIZE}px "Geist", sans-serif`;

      const letterW = ctx.measureText(ch).width;
      const body = buildBody(ch, FONT_SIZE, letterW, CELL / 2, CELL / 2);
      draw(ctx, body, COLORS[i % COLORS.length]);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = ch;

      cell.appendChild(cv);
      cell.appendChild(label);
      grid.appendChild(cell);
    });
  });
</script>
</body>
</html>
